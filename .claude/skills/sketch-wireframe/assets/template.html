<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe: {{FEATURE_NAME}}</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://unpkg.com/lucide@0.576.0"></script>
<style>
  :root {
    --w-bg: #f5f5f5;
    --w-border: #ccc;
    --w-text: #555;
    --w-muted: #aaa;
    --w-fill: #eee;
  }

  * {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    color: var(--w-text);
  }

  body { background: var(--w-bg); }

  /* Screen nav */
  nav { position: sticky; top: 0; z-index: 40; background: var(--w-bg); border-bottom: 1px solid var(--w-border); }
  nav button { cursor: pointer; font-size: 13px; }
  nav button:hover { background: var(--w-fill); border-radius: 4px; }
  nav button.active { font-weight: bold; border-bottom: 2px solid var(--w-text); }

  .screen { display: none; }
  .screen.active { display: block; }

  /* 화면 간 전환 배선: data-goto="screen-<id>" 를 단 요소는 클릭 시 해당 화면으로 이동 */
  [data-goto] { cursor: pointer; }
  [data-goto]::after { content: " ↗"; color: var(--w-muted); }
  [data-goto]:hover { outline: 2px solid var(--w-text); outline-offset: 2px; }

  /* 화면 밖 진입 조건 한 줄 (템플릿 크롬) */
  .screen-entry { font-size: 12px; color: var(--w-muted); margin: -12px 0 16px; }

  /* Viewport toggle */
  .vp-toggle button {
    font-size: 12px; padding: 2px 8px;
    border: 1px solid var(--w-border); cursor: pointer; background: white;
  }
  .vp-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .vp-toggle button:last-child { border-radius: 0 4px 4px 0; border-left: none; }
  .vp-toggle button.active { background: var(--w-text); color: white; }

  /* Mobile viewport frame
     Tailwind v4 유틸리티는 cascade layer 안에 있어 unlayered 규칙이 이긴다 — !important 불필요.
     padding은 강제하지 않는다: 콘텐츠가 쓴 유틸리티가 모바일 뷰에서도 그대로 보여야 한다. */
  body.viewport-mobile .screen-content {
    max-width: 375px;
    margin: 24px auto;
    border: 2px solid var(--w-border);
    min-height: 667px;
    background: white;
  }
</style>
</head>
<body class="p-0 m-0 viewport-mobile">

<nav class="flex items-center gap-4 px-6 py-2">
  <span class="text-xs" style="color:var(--w-muted)">wireframe</span>
  <!-- NAV_BUTTONS -->
  <div class="vp-toggle flex ml-auto">
    <button id="vp-desktop" onclick="setViewport('desktop')">Desktop</button>
    <button id="vp-mobile" onclick="setViewport('mobile')" class="active">Mobile</button>
  </div>
</nav>

<!-- SCREEN_CONTENT -->

<!--
  ──────────────────────────────────────
  화면 삽입 패턴 (이 주석은 삭제하지 않는다)
  ──────────────────────────────────────

  화면 id는 의미 있는 이름을 쓴다 (예: list, empty, detail).
  숫자 순번은 중간에 화면을 삽입할 때 data-goto 참조가 깨진다.

  NAV_BUTTONS 위치에 삽입:
  <button id="nav-list" onclick="show('list')" class="px-2 py-1">화면 이름</button>

  SCREEN_CONTENT 위치에 삽입:
  <div id="screen-list" class="screen" data-scenario="S1">
    <div class="screen-content @container max-w-6xl mx-auto p-6">

      <h2 class="text-lg font-bold mb-5" style="color:var(--w-muted); border-bottom:1px solid var(--w-border); padding-bottom:8px;">
        화면 이름
      </h2>
      <p class="screen-entry">진입: 로그인 성공 직후</p>
      (진입 조건 줄은 화면 밖에서 진입하는 조건이 있을 때만 넣는다)

      여기에 와이어프레임 컨텐츠 작성
      - 반응형: 모바일 우선 → @md: 접두사로 데스크톱 레이아웃
      - 다른 화면으로 전환하는 요소에는 data-goto를 단다. 전환을 글로 설명하지 않는다:
        <button data-goto="screen-detail" class="...">할 일 열기</button>

    </div>
  </div>
-->

<script>
function show(id) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById('screen-' + id).classList.add('active');
  document.querySelectorAll('nav button[id^="nav-"]').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('nav-' + id).classList.add('active');
}

function setViewport(mode) {
  document.body.classList.remove('viewport-mobile', 'viewport-desktop');
  document.body.classList.add('viewport-' + mode);
  document.querySelectorAll('.vp-toggle button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('vp-' + mode).classList.add('active');
}

document.addEventListener('click', function(e) {
  var target = e.target.closest('[data-goto]');
  if (target) show(target.getAttribute('data-goto').replace('screen-', ''));
});

document.addEventListener('DOMContentLoaded', function() {
  var first = document.querySelector('nav button[id^="nav-"]');
  if (first) first.click();
  lucide.createIcons();
});
</script>
</body>
</html>
